<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog Admin Dashboard</title>
    <link rel="stylesheet" href="Admin.css" />
    <!-- Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <!-- Loader -->
    <div id="loader" class="loader-container">
      <div class="spinner"></div>
    </div>

    <!-- Alert Message Dropdown -->
    <div id="alert-box" class="alert-box">
      <span id="alert-icon"></span>
      <span id="alert-message"></span>
    </div>

    <!-- Top Bar -->
    <header class="top-bar">
      <div class="date-display" id="current-date">Date, Month Year</div>
      <div class="top-right">
        <div class="notification-wrapper">
          <i
            class="fa-solid fa-bell"
            onclick="toggleDropdown('notif-dropdown')"
          ></i>
          <div id="notif-dropdown" class="dropdown-content">
            <p>New post published successfully</p>
            <p>Database backup complete</p>
          </div>
        </div>
        <div class="user-info-wrapper">
          <div class="user-trigger" onclick="toggleDropdown('user-dropdown')">
            <span id="header-username">Admin User</span>
            <i class="fa-solid fa-circle-user"></i>
          </div>
          <div id="user-dropdown" class="dropdown-content">
            <p><i class="fa-solid fa-user"></i> Profile</p>
            <p><i class="fa-solid fa-gear"></i> Settings</p>
            <hr />
            <p style="color: red">
              <i class="fa-solid fa-right-from-bracket"></i> Logout
            </p>
          </div>
        </div>
      </div>
    </header>

    <main class="dashboard-container">
      <!-- Stats Figures -->
      <section class="stats-row">
        <div class="stat-card" onclick="openModal('list-modal', 'published')">
          <i class="fa-solid fa-check-double icon-pub"></i>
          <div class="stat-info">
            <h3 id="pub-count">0</h3>
            <p>Published Posts</p>
          </div>
        </div>
        <div class="stat-card" onclick="openModal('list-modal', 'draft')">
          <i class="fa-solid fa-file-pen icon-draft"></i>
          <div class="stat-info">
            <h3 id="draft-count">0</h3>
            <p>Drafted Posts</p>
          </div>
        </div>
        <div class="user-detail-card">
          <h4>Logged In As:</h4>
          <p class="u-name">John Doe</p>
          <p class="u-role">Administrator</p>
        </div>
      </section>

      <!-- Write Blog Section -->
      <section class="editor-section">
        <h2><i class="fa-solid fa-pen-nib"></i> Create New Blog</h2>
        <div class="editor-form">
          <div class="input-group">
            <label>Featured Image</label>
            <input type="file" id="post-image" accept="image/*" />
          </div>
          <div class="grid-2">
            <input type="text" id="post-title" placeholder="Blog Title" />
            <input type="text" id="post-slug" placeholder="slug-url-path" />
          </div>
          <select id="post-category">
            <option value="">Select Category</option>
            <option value="software development">Software Development</option>
            <option value="branding">Branding</option>
            <option value="business building">Business Building</option>
            <option value="media">Media</option>
          </select>
          <textarea id="post-excerpt" placeholder="Short Excerpt..."></textarea>
          <textarea
            id="post-content"
            placeholder="Write your blog content here..."
            rows="10"
          ></textarea>
          <div class="form-buttons">
            <button class="btn-draft" onclick="handleSave('draft')">
              Save Draft
            </button>
            <button class="btn-pub" onclick="handleSave('published')">
              Publish Post
            </button>
          </div>
        </div>
      </section>

      <!-- Database Feed -->
      <section class="database-feed">
        <h2><i class="fa-solid fa-database"></i> Database Feed</h2>
        <table id="db-table">
          <thead>
            <tr>
              <th>Title</th>
              <th>Category</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="db-body">
            <!-- Dynamic Rows -->
          </tbody>
        </table>
      </section>
    </main>

    <!-- MODAL: List of Published/Drafts -->
    <div id="list-modal" class="modal-overlay">
      <div class="modal-content list-view">
        <div class="modal-header">
          <h2 id="modal-list-title">Posts</h2>
          <button class="btn-exit" onclick="closeModal('list-modal')">
            &times;
          </button>
        </div>
        <div class="modal-body">
          <div id="posts-container"></div>
          <button class="btn-more" onclick="loadMore()">More Posts</button>
        </div>
      </div>
    </div>

    <!-- MODAL: Edit Interface -->
    <div id="edit-modal" class="modal-overlay">
      <div class="modal-content editor-view">
        <div class="modal-header">
          <h2>Edit Post</h2>
          <button class="btn-exit" onclick="closeModal('edit-modal')">
            &times;
          </button>
        </div>
        <div class="modal-body">
          <input type="text" id="edit-title" class="full-input" />
          <select id="edit-category" class="full-input">
            <option value="software development">Software Development</option>
            <option value="branding">Branding</option>
            <option value="business building">Business Building</option>
            <option value="media">Media</option>
          </select>
          <textarea id="edit-content" rows="8" class="full-input"></textarea>
          <div class="form-buttons">
            <button class="btn-exit" onclick="closeModal('edit-modal')">
              Exit
            </button>
            <button class="btn-draft" onclick="handleEditSave('draft')">
              Save as Draft
            </button>
            <button class="btn-pub" onclick="handleEditSave('published')">
              Publish
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="admin.js"></script>
  </body>
</html>
