<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Revit-Systems</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
      integrity="sha512-KM3K1aO2Q0Z/6N4zCkZrB+EThBo5A9R2yQ1kXLL1B0A5QXwN+1FoXc0huw8dF+R3Rf4N0rKM7pwcqz3FlT7S+g=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <link rel="stylesheet" href="style.css" />
    <style>
      .admin-container-holder {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-size: cover;
        background: linear-gradient(#d17609, #8b5b21);
        background-position: center;
      }
      .image-holder {
        width: 100%;
      }
      img {
        width: 70%;
      }
      .the-admin-container {
        width: 60%;
        margin: 50px auto;
        backdrop-filter: blur(8px);
        padding: 40px 20px;
        border-radius: 8px;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .the-admin-container h1 {
        margin-bottom: 20px;
        color: #ffffff;
        font-weight: 600;
        font-size: 40px;
      }

      .the-admin-container p {
        color: #ffffff;
        font-weight: 600;
        margin-top: 20px;
        font-size: 15px;
      }
      .the-admin-icon-and-details-holder {
        margin-top: 20px;
      }

      .the-admin-icon-holder {
        margin-bottom: 20px;
      }

      .lucide-user-round-icon {
        width: 100px;
        height: 100px;
        color: #4d3312;
      }

      form {
        width: 95%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: start;
      }

      label {
        display: block;
        text-align: left;
        font-weight: bold;
        margin-bottom: 5px;
      }

      input[type="text"],
      input[type="password"] {
        width: 250px;
        padding: 17px 15px;
        border: 1px solid #ffffffdb;
        border-radius: 30px;
        background-color: transparent;
        outline: none;
        font-weight: 700;
        color: white;
        font-size: 1rem;
      }

      ::placeholder {
        color: white;
      }

      button {
        width: 220px;
        padding: 12px 30px;
        margin: auto;
        font-size: 1.2rem;
        font-weight: 700;
        background-color: #ffffff;
        color: #d17609;
        border: none;
        border-radius: 10px;
        cursor: pointer;
      }

      button:hover {
        background-color: #d17609;
        color: #ffffff;
      }
      @media (max-width: 600px) {
        .the-admin-container {
          width: 95%;
          padding: 40px 0px;
        }

        input[type="text"],
        input[type="password"] {
          width: 230px;
        }
      }

      .error-div {
        width: 200px;
        height: 40px;
        align-items: center;
        justify-content: center;
        text-align: center;
        display: flex;
        border-radius: 10px;
        background-color: rgb(150, 0, 0);
        position: absolute;
        top: 0px;
        font-size: 0.7rem;
        color: white;
        transform: translateY(-100%);
        right: 10px;
        transition: all 0.5s;
      }

      .valid-div {
        width: 200px;
        height: 40px;
        align-items: center;
        justify-content: center;
        text-align: center;
        display: flex;
        border-radius: 10px;
        background-color: rgb(19, 97, 1);
        position: absolute;
        top: 0px;
        font-size: 0.7rem;
        color: white;
        transform: translateY(-100%);
        right: 10px;
        transition: all 0.5s;
      }

      .error-div.show-div,
      .valid-div.show-div {
        transform: translateY(20%);
        transition: all 0.1s;
      }

      .the-options:hover {
        color: blue;
        cursor: pointer;
      }

      .sign-up {
        display: none;
      }

      .sign-up.show {
        display: block;
      }

      .sign-in {
        display: block;
      }

      .sign-in.show-not {
        display: none;
      }

      .password-container {
        position: relative;
        display: inline-block;
      }

      #password-input {
        padding-right: 15px; /* Space for the eye icon */
      }

      .toggle-password {
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
      }

      .status-element {
        width: 240px;
        position: fixed;
        top: 20px;
        right: -100%;
        z-index: 4;
        background-color: white;
        padding: 10px;
        align-items: center;
        justify-content: center;
        box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.112);
        border-radius: 10px;
        display: flex;
        transition: all ease 0.5s;
        color: green;
      }

      .status-element.status-update {
        right: 3%;
        transition: all ease 0.5s;
      }

      .fail {
        color: red;
      }

      .drafted {
        color: orange;
      }
      /* HTML: <div class="loader"></div> */
      .loader-holder {
        position: fixed;
        width: 100%;
        height: 100vh;
        background-color: #0000008c;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(1px);
        display: none;
      }
      .loader {
        height: 80px;
        aspect-ratio: 1;
        padding: 10px;
        border-radius: 50%;
        box-sizing: border-box;
        position: relative;
        mask: conic-gradient(#000 0 0) content-box exclude,
          conic-gradient(#000 0 0);
        filter: blur(12px);
      }
      .loader:before {
        content: "";
        position: absolute;
        inset: 0;
        background: conic-gradient(#0000 25%, #d17609, #0000 65%);
        animation: l1 1.5s linear infinite;
      }
      @keyframes l1 {
        to {
          rotate: 1turn;
        }
      }

      .loader-holder.show-face {
        display: flex;
      }
    </style>
  </head>
  <body>
    <div class="loader-holder" id="loader">
      <div class="loader"></div>
    </div>
    <div class="admin-container-holder">
      <div class="the-admin-container">
        <div class="the-admin-icon-and-details-holder sign-in" id="sign-in">
          <h1>Welcome</h1>
          <form>
            <input
              type="text"
              id="signin-username"
              name="username"
              placeholder="Username or Email"
              required
            />
            <br /><br />
            <div class="password-container">
              <input
                type="password"
                placeholder="Enter your password"
                id="signin-user-password"
              />
              <span class="toggle-password">👁️</span>
            </div>

            <i class="fa fa-eye" id="toggleSignInPassword"></i>
            <br /><br />
            <button onclick="authenticate(event)">Login</button>
          </form>

          <p class="the-options">Forgot password</p>
          <p class="the-options" onclick="theSignUp()">Sign Up</p>
        </div>
        <div class="the-admin-icon-and-details-holder sign-up" id="sign-up">
          <h1>Sign Up</h1>
          <form id="the-form">
            <input
              type="text"
              id="signup-username"
              name="username"
              placeholder="Username"
              required
            />
            <br /><br />
            <input
              type="text"
              id="signup-useremail"
              name="User-email"
              placeholder="Email"
              required
            />
            <br /><br /><input
              type="text"
              id="signup-user-number"
              name="user-number"
              placeholder="Phone Number"
              required
            />
            <br /><br />
            <input
              type="text"
              id="signup-role"
              name="role"
              placeholder="Role"
              required
            />
            <br /><br />
            <div class="password-container">
              <input
                type="password"
                id="signup-password"
                placeholder="Enter your password"
              />
              <span class="toggle-password">👁️</span>
            </div>

            <br /><br />
            <div class="password-container">
              <input
                type="password"
                id="signup-password-confirm"
                placeholder="Confirm your password"
              />
              <span class="toggle-password">👁️</span>
            </div>

            <br /><br />
            <button onclick="authenticate(event)">Sign Up</button>
          </form>

          <p class="the-options" onclick="theSignUp()">Login</p>
        </div>
      </div>
    </div>
    <div class="status-element" id="status-element">Nothing</div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="./config.js"></script>
    <script>
      const backendURL = `${window.baseURL}/api/auth`;
      let form = document.getElementById("the-form");
      let statusEl = document.getElementById("status-element");
      let loader = document.getElementById("loader");
      // ---------- SIGNUP ----------
      async function handleSignup(event) {
        event.preventDefault();
        loader.classList.add("show-face");
        const username = document
          .querySelector("#sign-up input[name='username']")
          .value.trim();
        const email = document.querySelector("#signup-useremail").value.trim();
        const phone_number = document
          .querySelector("#signup-user-number")
          .value.trim();
        const role = document.querySelector("#signup-role").value.trim();

        const password = document
          .querySelector("#signup-password")
          .value.trim();
        const passwordConfirm = document
          .querySelector("#signup-password-confirm")
          .value.trim();
        // ✅ Check if passwords match
        if (password !== passwordConfirm) {
          statusEl.innerHTML = "Passwords do not match!";
          statusEl.classList.add("status-update", "fail");

          setTimeout(() => {
            statusEl.classList.remove("status-update", "fail");
            loader.classList.remove("show-face");
          }, 3000); // <-- 3000ms delay
          return;
        }

        try {
          const { data } = await axios.post(`${backendURL}/signup`, {
            username,
            email,
            phone_number,
            role,
            password,
          });
          statusEl.innerHTML = data.message;
          statusEl.classList.add("status-update");

          setTimeout(() => {
            statusEl.classList.remove("status-update");
            loader.classList.remove("show-face");
            form.reset();
            theSignUp(); // Switch to login screen
          }, 3000); // <-- 3000ms delay
          return;
        } catch (err) {
          console.error("Error:", err);

          // Axios errors might store the response in err.response
          const errorMsg =
            err.response?.data?.error ||
            err.response?.data?.message ||
            "Server error. Try again later.";

          statusEl.innerHTML = errorMsg;
          statusEl.classList.add("status-update", "fail");

          setTimeout(() => {
            statusEl.classList.remove("status-update", "fail");
            loader.classList.remove("show-face");
          }, 3000); // <-- 3000ms delay
        }
      }

      // ---------- LOGIN ----------
      async function handleLogin(event) {
        event.preventDefault();
        loader.classList.add("show-face");
        const email = document.getElementById("signin-username").value.trim();
        const password = document
          .getElementById("signin-user-password")
          .value.trim();

        try {
          const { data } = await axios.post(`${backendURL}/login`, {
            email,
            password,
          });

          // If the request succeeds
          statusEl.innerHTML = data.message;
          statusEl.classList.add("status-update");

          setTimeout(() => {
            statusEl.classList.remove("status-update");
            loader.classList.remove("show-face");
            localStorage.setItem("user", JSON.stringify(data.user));
            window.location.href = "./admin.html"; // redirect to dashboard
          }, 3000);
        } catch (err) {
          // Axios wraps errors, so handle both server and network errors
          if (err.response) {
            // Server responded with a status outside 2x
            statusEl.innerHTML =
              err.response.data.error || err.response.data.message;
            statusEl.classList.add("status-update", "fail");
            setTimeout(() => {
              statusEl.classList.remove("status-update", "fail");
              loader.classList.remove("show-face");
            }, 3000);
          } else if (err.request) {
            // Request was made but no response received
            statusEl.innerHTML = err.request.data.message;
            statusEl.classList.add("status-update", "fail");
            setTimeout(() => {
              statusEl.classList.remove("status-update", "fail");
              loader.classList.remove("show-face");
            }, 3000);
          } else {
            // Something else caused the error
            statusEl.innerHTML = err.message;
            statusEl.classList.add("status-update", "fail");
            setTimeout(() => {
              statusEl.classList.remove("status-update", "fail");
              loader.classList.remove("show-face");
            }, 3000);
          }
          console.error(err);
        }
      }

      // attach events
      document
        .querySelector("#sign-in form")
        .addEventListener("submit", handleLogin);
      document
        .querySelector("#sign-up form")
        .addEventListener("submit", handleSignup);

      // ---------- Toggle password visibility ----------
      document.querySelectorAll(".toggle-password").forEach((toggle) => {
        toggle.addEventListener("click", function () {
          const input = this.previousElementSibling;
          const type =
            input.getAttribute("type") === "password" ? "text" : "password";
          input.setAttribute("type", type);
          this.textContent = type === "password" ? "👁️" : "🙈";
        });
      });

      // ---------- Switch between forms ----------
      const signUp = document.getElementById("sign-up");
      const signIn = document.getElementById("sign-in");
      function theSignUp() {
        signIn.classList.toggle("show-not");
        signUp.classList.toggle("show");
      }
    </script>
  </body>
</html>
