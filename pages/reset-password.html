<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password — Revit Systems</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      rel="icon"
      type="image/png"
      href="https://res.cloudinary.com/dmvltush8/image/upload/v1760973008/favicon_qdd9zl.png"
    />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      :root {
        --primary: #d17609;
        --primary-hover: #b86808;
        --primary-light: rgba(209, 118, 9, 0.1);
        --dark: #242527;
        --gray-100: #f8f9fa;
        --gray-200: #e9ecef;
        --gray-300: #dee2e6;
        --gray-500: #adb5bd;
        --gray-600: #6c757d;
        --gray-700: #495057;
        --success: #28a745;
        --danger: #dc3545;
        --radius: 8px;
        --radius-lg: 16px;
        --shadow-lg: 0 10px 40px rgba(0,0,0,0.15);
        --transition: all 0.3s ease;
      }

      body {
        font-family: "DM Sans", sans-serif;
        min-height: 100vh;
        background: linear-gradient(135deg, var(--dark) 0%, #3a3d42 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
      }

      /* ---- floating bg shapes ---- */
      .bg-animation {
        position: fixed;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
        z-index: 0;
      }
      .floating-shape {
        position: absolute;
        border-radius: 50%;
        background: var(--primary);
        opacity: 0.05;
        animation: float 20s infinite ease-in-out;
      }
      .shape-1 { width:400px; height:400px; top:-100px; right:-100px; }
      .shape-2 { width:300px; height:300px; bottom:-50px; left:-50px; animation-delay:-5s; }
      .shape-3 { width:200px; height:200px; top:50%; left:20%; animation-delay:-10s; }
      @keyframes float {
        0%,100% { transform: translate(0,0) scale(1); }
        25%  { transform: translate(30px,-30px) scale(1.1); }
        50%  { transform: translate(-20px,20px) scale(1); }
        75%  { transform: translate(-30px,-20px) scale(0.9); }
      }

      /* ---- card ---- */
      .card {
        position: relative;
        z-index: 1;
        background: #fff;
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-lg);
        padding: 2.5rem 2rem;
        width: 100%;
        max-width: 420px;
        animation: slideUp 0.5s ease;
      }
      @keyframes slideUp {
        from { opacity:0; transform:translateY(24px); }
        to   { opacity:1; transform:translateY(0); }
      }

      .card-icon {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        background: var(--primary-light);
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1.25rem;
        font-size: 1.6rem;
        color: var(--primary);
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 800;
        color: var(--dark);
        text-align: center;
        margin-bottom: 0.4rem;
        letter-spacing: -0.02em;
      }

      .subtitle {
        font-size: 0.88rem;
        color: var(--gray-600);
        text-align: center;
        margin-bottom: 1.75rem;
        line-height: 1.5;
      }

      /* ---- form ---- */
      .form-group {
        margin-bottom: 1.1rem;
      }
      label {
        display: block;
        font-size: 0.82rem;
        font-weight: 700;
        color: var(--gray-700);
        margin-bottom: 0.4rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .input-wrap {
        position: relative;
      }
      .input-wrap input {
        width: 100%;
        padding: 0.8rem 2.6rem 0.8rem 1rem;
        border: 2px solid var(--gray-200);
        border-radius: var(--radius);
        font-family: inherit;
        font-size: 0.95rem;
        color: var(--dark);
        transition: var(--transition);
        outline: none;
      }
      .input-wrap input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px var(--primary-light);
      }
      .toggle-pw {
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: var(--gray-500);
        cursor: pointer;
        font-size: 0.95rem;
        padding: 4px;
        transition: var(--transition);
      }
      .toggle-pw:hover { color: var(--primary); }

      /* ---- hint bars under password ---- */
      .pw-hints {
        margin-top: 6px;
        display: flex;
        gap: 6px;
      }
      .hint-bar {
        flex: 1;
        height: 4px;
        border-radius: 2px;
        background: var(--gray-200);
        transition: background 0.3s;
      }
      .hint-bar.weak   { background: #dc3545; }
      .hint-bar.fair   { background: #ffc107; }
      .hint-bar.strong { background: #28a745; }

      /* ---- submit btn ---- */
      .btn {
        width: 100%;
        padding: 0.9rem;
        background: var(--primary);
        color: #fff;
        border: none;
        border-radius: var(--radius);
        font-family: inherit;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        transition: var(--transition);
        margin-top: 0.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      .btn:hover:not(:disabled) {
        background: var(--primary-hover);
        transform: translateY(-1px);
      }
      .btn:disabled { opacity: 0.65; cursor: not-allowed; }

      /* ---- feedback banner ---- */
      .feedback {
        display: none;
        margin-top: 1rem;
        padding: 0.75rem 1rem;
        border-radius: var(--radius);
        font-size: 0.88rem;
        font-weight: 600;
        align-items: center;
        gap: 8px;
      }
      .feedback.success { display:flex; background:#e9f7ef; color:#1a7a4a; }
      .feedback.error   { display:flex; background:#fde8e8; color:#b33232; }

      /* ---- invalid-link state ---- */
      .invalid-state {
        text-align: center;
        display: none;
      }
      .invalid-state i {
        font-size: 2.5rem;
        color: var(--danger);
        margin-bottom: 1rem;
        display: block;
      }
      .invalid-state p {
        font-size: 0.9rem;
        color: var(--gray-600);
        margin-bottom: 1.5rem;
        line-height: 1.5;
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--primary);
        text-decoration: none;
        margin-top: 1.25rem;
        width: 100%;
        justify-content: center;
        transition: var(--transition);
      }
      .back-link:hover { color: var(--primary-hover); }

      /* ---- spinner ---- */
      .spinner {
        width: 18px;
        height: 18px;
        border: 2.5px solid rgba(255,255,255,0.35);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        display: none;
      }
      @keyframes spin { to { transform:rotate(360deg); } }
    </style>
  </head>
  <body>
    <div class="bg-animation">
      <div class="floating-shape shape-1"></div>
      <div class="floating-shape shape-2"></div>
      <div class="floating-shape shape-3"></div>
    </div>

    <div class="card">
      <!-- Icon -->
      <div class="card-icon">
        <i class="fas fa-lock"></i>
      </div>

      <!-- ── INVALID LINK STATE (shown when URL is missing token/id) ── -->
      <div class="invalid-state" id="invalidState">
        <i class="fas fa-exclamation-triangle"></i>
        <h1>Invalid Link</h1>
        <p>
          This password reset link is missing required information or has
          already been used. Please request a new one.
        </p>
        <a href="./login.html" class="back-link">
          <i class="fas fa-arrow-left"></i> Back to login
        </a>
      </div>

      <!-- ── RESET FORM (shown when token + id are present in URL) ── -->
      <div id="resetForm">
        <h1>Set New Password</h1>
        <p class="subtitle">Choose a strong password for your account.</p>

        <div class="form-group">
          <label for="newPassword">New password</label>
          <div class="input-wrap">
            <input
              type="password"
              id="newPassword"
              placeholder="At least 8 characters"
              autocomplete="new-password"
            />
            <button class="toggle-pw" type="button" id="toggleNew" aria-label="Toggle password visibility">
              <i class="fas fa-eye"></i>
            </button>
          </div>
          <div class="pw-hints" id="pwHints">
            <div class="hint-bar" id="bar1"></div>
            <div class="hint-bar" id="bar2"></div>
            <div class="hint-bar" id="bar3"></div>
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm password</label>
          <div class="input-wrap">
            <input
              type="password"
              id="confirmPassword"
              placeholder="Repeat your password"
              autocomplete="new-password"
            />
            <button class="toggle-pw" type="button" id="toggleConfirm" aria-label="Toggle password visibility">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <button class="btn" id="submitBtn" type="button">
          <span class="spinner" id="spinner"></span>
          <span id="btnText">Reset password</span>
        </button>

        <div class="feedback" id="feedback"></div>

        <a href="./login.html" class="back-link">
          <i class="fas fa-arrow-left"></i> Back to login
        </a>
      </div>
    </div>

    <script src="../assets/js/config.js"></script>
    <script>
      // ── Read token and userId from the URL query string ──
      const params  = new URLSearchParams(window.location.search);
      const token   = params.get("token");
      const userId  = params.get("id");

      // If either is missing the link is invalid — show the error state
      if (!token || !userId) {
        document.getElementById("resetForm").style.display = "none";
        document.getElementById("invalidState").style.display = "block";
      }

      // ── Password strength indicator ──
      const newPwInput = document.getElementById("newPassword");
      const bars = [
        document.getElementById("bar1"),
        document.getElementById("bar2"),
        document.getElementById("bar3"),
      ];

      function scorePassword(pw) {
        let score = 0;
        if (pw.length >= 8)  score++;
        if (pw.length >= 12) score++;
        if (/[A-Z]/.test(pw) && /[0-9!@#$%^&*]/.test(pw)) score++;
        return score; // 0–3
      }

      newPwInput.addEventListener("input", () => {
        const score = scorePassword(newPwInput.value);
        const classes = ["", "weak", "fair", "strong"];
        bars.forEach((bar, i) => {
          bar.className = "hint-bar";
          if (i < score) bar.classList.add(classes[score]);
        });
      });

      // ── Toggle password visibility ──
      function setupToggle(btnId, inputId) {
        const btn = document.getElementById(btnId);
        const inp = document.getElementById(inputId);
        btn.addEventListener("click", () => {
          const showing = inp.type === "text";
          inp.type = showing ? "password" : "text";
          btn.querySelector("i").className = showing ? "fas fa-eye" : "fas fa-eye-slash";
        });
      }
      setupToggle("toggleNew",     "newPassword");
      setupToggle("toggleConfirm", "confirmPassword");

      // ── Feedback helper ──
      function showFeedback(msg, type) {
        const el = document.getElementById("feedback");
        el.className = `feedback ${type}`;
        el.innerHTML = `<i class="fas fa-${type === "success" ? "check" : "exclamation"}-circle"></i> ${msg}`;
      }

      // ── Submit ──
      document.getElementById("submitBtn").addEventListener("click", async () => {
        const newPassword    = newPwInput.value;
        const confirmPassword = document.getElementById("confirmPassword").value;
        const btn    = document.getElementById("submitBtn");
        const spinner = document.getElementById("spinner");
        const btnText = document.getElementById("btnText");

        // Clear previous feedback
        const fbEl = document.getElementById("feedback");
        fbEl.className = "feedback";

        if (!newPassword) {
          return showFeedback("Please enter a new password.", "error");
        }
        if (newPassword.length < 8) {
          return showFeedback("Password must be at least 8 characters.", "error");
        }
        if (newPassword !== confirmPassword) {
          return showFeedback("Passwords do not match.", "error");
        }

        // Loading state
        btn.disabled = true;
        spinner.style.display = "block";
        btnText.textContent = "Resetting…";

        try {
          const res = await fetch(`${window.baseURL}/auth/reset-password`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ userId, token, newPassword }),
          });

          const data = await res.json();

          if (!res.ok) {
            throw new Error(data.message || "Reset failed.");
          }

          // Success — show message then redirect to login
          showFeedback(data.message || "Password updated! Redirecting…", "success");
          btnText.textContent = "Done!";

          setTimeout(() => {
            window.location.href = "./login.html";
          }, 2500);
        } catch (err) {
          showFeedback(err.message, "error");
          btn.disabled = false;
          spinner.style.display = "none";
          btnText.textContent = "Reset password";
        }
      });

      // Allow Enter key to submit
      document.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          document.getElementById("submitBtn").click();
        }
      });
    </script>
  </body>
</html>
